events {
    worker_connections 1024;
}

http {
    # ── Upstream pools ─────────────────────────────────────────────────────────
    upstream lending_service {
        server app:8501;
    }

    upstream lending_api {
        server lending_api:8000;
    }

    upstream ocr_service {
        server ocr_service:8001;
    }

    upstream notification_service {
        server notification_service:8002;
    }

    upstream mlflow_ui {
        server mlflow:5000;
    }

    upstream mlflow_model {
        server mlflow_serve:8080;
    }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Tăng kích thước upload cho OCR (tài liệu PDF lớn)
        client_max_body_size 50M;

        # ── Routing rules ──────────────────────────────────────────────────────

        # REST API (FastAPI – BE cho FE riêng)
        location /api/ {
            proxy_pass http://lending_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Giao diện chính (Streamlit App – giữ trong giai đoạn chuyển đổi)

        location / {
            proxy_pass http://lending_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        # OCR Microservice
        location /api/ocr/ {
            rewrite ^/api/ocr(/.*)$ $1 break;
            proxy_pass http://ocr_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Notification Microservice
        location /api/notify/ {
            rewrite ^/api/notify(/.*)$ $1 break;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # MLflow UI
        location /mlflow/ {
            rewrite ^/mlflow(/.*)$ $1 break;
            proxy_pass http://mlflow_ui;
            proxy_set_header Host $host;
        }

        # MLflow Model Invocations
        location /invocations {
            proxy_pass http://mlflow_model;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # Health check tổng thể
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
